services:
  - type: web
    name: autovid-backend
    runtime: python
    plan: free

    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      - key: PORT
        value: 10000

      - key: MONGO_URL
        sync: false

      - key: DATABASE_NAME
        sync: false

      - key: SECRET_KEY
        sync: false

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"